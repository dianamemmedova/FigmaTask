<header class="header-container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="logo-wrap">
        <img src="photo/logo.png" alt="Logo" class="main-logo">
      </a>

      <div class="contacts">
        <a href="tel:+994120000000" class="topbar-contact">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#DD9F51" stroke-width="1.5">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          +994 12 000 00 00
        </a>
        <a href="mailto:info@eduaz" class="topbar-contact">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#DD9F51" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          info&#64;eduaz
        </a>
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <div class="lang-switcher">
        <button *ngFor="let lang of langs" [class.active]="lang === currentLang" (click)="setLang(lang)" class="lang-btn">{{ lang }}</button>
      </div>
    </div>
  </div>

  <div class="navbar">
    <div class="nav-white-bg">
      <nav class="nav-links">
        <a *ngFor="let link of navLinks" href="#" class="nav-link">
          {{ link.label }}
        </a>
      </nav>
    </div>

    <div class="nav-actions">
      <button class="btn btn-outline">Daxil ol</button>
      <button class="btn btn-primary">Qeydiyyat</button>
    </div>

    <button class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Menyu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen">
    <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="active" class="nav-link" (click)="menuOpen = false">
      {{ link.label }}
    </a>
    <button class="btn btn-outline">Daxil ol</button>
    <button class="btn btn-primary">Qeydiyyat</button>
  </div>

</header>
