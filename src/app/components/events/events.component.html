<section class="events-section">
  <div class="events-container">

    <div class="events-block">
      <div class="block-header">
        <h2 class="block-title">Tədbirlər</h2>
        <a href="#" class="see-all">Hamısına bax</a>
      </div>
      <div class="event-list">
        <div class="event-item" *ngFor="let e of events">
          <div class="event-date-box">
            <span class="event-day">{{ e.day }}</span>
            <span class="event-month">{{ e.month }}</span>
          </div>
          <p class="event-description">{{ e.title }}</p>
        </div>
      </div>
    </div>

    <div class="conferences-block">
      <div class="block-header">
        <h2 class="block-title">Konfranslar</h2>
        <a href="#" class="see-all">Hamısına bax</a>
      </div>
      <div class="conf-grid">
        <div class="conf-card conf-large">
          <img [src]="conferences[0].image" [alt]="conferences[0].title" />
          <div class="conf-overlay">
            <p class="conf-text">{{ conferences[0].title }}</p>
          </div>
        </div>
        <div class="conf-small-row">
          <div class="conf-card conf-small" *ngFor="let c of conferences.slice(1)">
            <img [src]="c.image" [alt]="c.title" />
            <div class="conf-overlay">
              <p class="conf-text">{{ c.title }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
